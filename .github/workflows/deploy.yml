name: Deploy Flutter Web

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.2
          channel: stable
      - run: flutter pub get
      - run: flutter config --enable-web
      - name: Analyze
        run: flutter analyze 2>&1 | tee analyze_output.txt
        continue-on-error: true
      - name: Show analyze output
        run: cat analyze_output.txt
      - name: Build web
        run: flutter build web --release 2>&1 | tee build_output.txt
        continue-on-error: true
      - name: Show build errors
        run: |
          echo "=== GREP ERROR ===" && grep -in "error\|Error\|SEVERE" build_output.txt | head -40
          echo "=== LAST 50 LINES ===" && tail -50 build_output.txt
      - name: Check output
        run: ls -la build/web/ 2>&1 && wc -c build/web/index.html 2>&1 || echo "No output"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: build/web
          if-no-files-found: warn