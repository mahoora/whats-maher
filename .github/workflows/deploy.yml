name: Deploy Flutter Web

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.2
          channel: stable
      - run: flutter pub get
      - run: flutter --version
      - run: flutter doctor -v
      - run: flutter config --enable-web
      - name: Capture analyze errors
        run: flutter analyze > analyze_output.txt 2>&1 || true
      - name: Upload analyze output
        uses: actions/upload-artifact@v4
        with:
          name: analyze-output
          path: analyze_output.txt
          if-no-files-found: warn
      - name: Test minimal web build
        run: |
          cd /tmp
          flutter create --project-name=testweb --platforms=web testweb 2>&1 | tail -5
          cd testweb
          flutter build web --release 2>&1 | tail -20
        continue-on-error: true
      - name: Build our project (capture errors)
        run: flutter build web --release > build_errors.txt 2>&1 || true
      - name: Upload build errors
        uses: actions/upload-artifact@v4
        with:
          name: build-errors
          path: build_errors.txt
          if-no-files-found: warn
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
